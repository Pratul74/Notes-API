<!DOCTYPE html>
<html>
<head>
    <title>Note Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
    <h1 id="pageTitle" class="text-2xl font-bold mb-4">Create Note</h1>

    <input id="title" placeholder="Title"
        class="w-full border p-2 rounded mb-3">

    <textarea id="content" placeholder="Content"
        class="w-full border p-2 rounded mb-3"></textarea>

    <select id="category"
        class="w-full border p-2 rounded mb-3">
        <option value="work">Work</option>
        <option value="study">Study</option>
        <option value="personal">Personal</option>
        <option value="other">Other</option>
    </select>

    <div class="flex gap-2">
        <button onclick="saveNote()"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
            Save
        </button>

        <button onclick="goBack()"
            class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">
            Back
        </button>
    </div>
</div>

<script src="editor.js"></script>
</body>
</html>
