<!DOCTYPE html>
<html>
<head>
    <title>My Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

<div class="flex justify-between items-center mb-4">
    
    <select id="categoryFilter" onchange="loadRecords()"
        class="border p-2 rounded">
        <option value="all">All Categories</option>
        <option value="work">Work</option>
        <option value="study">Study</option>
        <option value="personal">Personal</option>
        <option value="other">Other</option>
    </select>

</div>

<div class="max-w-4xl mx-auto p-5">
    <h1 class="text-3xl font-bold text-center mb-6">📝 My Notes</h1>

    <div id="recordsList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
</div>


<!-- Floating Add Button -->
<button onclick="goToCreate()"
    class="fixed bottom-6 right-6 bg-blue-500 hover:bg-blue-600 text-white w-14 h-14 rounded-full text-2xl shadow-lg">
    +
</button>

<script src="app.js"></script>
</body>
</html>
